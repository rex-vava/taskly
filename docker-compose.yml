services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskly
    ports:
      - "5432:5432"
    volumes:
      - taskly_pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskly"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:password@db:5432/taskly
      JWT_SECRET: taskly-docker-dev-secret-change-me
      CLIENT_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api

volumes:
  taskly_pgdata:
